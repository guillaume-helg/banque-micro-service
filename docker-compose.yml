version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: customer_db
    ports:
      - "3306:3306"
    networks:
      - banque-net
    restart: on-failure

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - banque-net
    restart: on-failure

  zipkin:
    image: openzipkin/zipkin
    ports:
      - "9411:9411"
    networks:
      - banque-net
    restart: on-failure

  discovery-service:
    build: ./discovery-service
    ports:
      - "8761:8761"
    networks:
      - banque-net
    restart: on-failure

  config-service:
    build: ./config-service
    ports:
      - "8888:8888"
    depends_on:
      - discovery-service
    volumes:
      - ./config-repo:/config-repo
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/config-repo
    networks:
      - banque-net
    restart: on-failure

  gateway-service:
    build: ./gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - config-service
      - discovery-service
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - banque-net
    restart: on-failure

  customer-service:
    build: ./customer-service
    ports:
      - "8081:8081"
    depends_on:
      - config-service
      - mysql
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/customer_db
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - banque-net
    restart: on-failure

  account-service:
    build: ./account-service
    ports:
      - "8082:8082"
    depends_on:
      - config-service
      - mongodb
    entrypoint: ["java", "--add-opens", "java.base/java.util=ALL-UNNAMED", "--add-opens", "java.base/java.lang=ALL-UNNAMED", "--add-opens", "java.base/sun.util.calendar=ALL-UNNAMED", "-jar", "/app.jar"]
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888/
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/account_db
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - banque-net
    restart: on-failure

  composite-service:
    build: ./composite-service
    ports:
      - "8083:8083"
    depends_on:
      - config-service
      - customer-service
      - account-service
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - banque-net
    restart: on-failure

  monitoring-service:
    build: ./monitoring-service
    ports:
      - "9090:9090"
    depends_on:
      - discovery-service
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - banque-net
    restart: on-failure

networks:
  banque-net:
    driver: bridge
